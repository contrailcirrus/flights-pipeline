apiVersion: batch/v1
kind: CronJob
metadata:
  name: spire-raw-batch-cronjob
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  suspend: {{ .Values.suspendCronjob | required ".Values.suspendCronjob is required" }}

  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          nodeSelector:
            cloud.google.com/compute-class: "Balanced"
          restartPolicy: Never
          serviceAccountName: flights-pipeline-default-sa
          terminationGracePeriodSeconds: 60
          containers:
            - name: main
              image: {{ .Values.image | required ".Values.image is required" | quote }}
              env:
                - name: LOG_LEVEL
                  value: {{ .Values.logLevel | required ".Values.logLevel is required" | quote }}
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "200m"
                  memory: "256Mi"

