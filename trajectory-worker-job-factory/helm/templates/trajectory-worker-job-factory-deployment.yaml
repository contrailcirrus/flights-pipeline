apiVersion: apps/v1
kind: Deployment
metadata:
  name: trajectory-worker-job-factory
  labels:
    app: trajectory-worker-job-factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trajectory-worker-job-factory
  template:
    metadata:
      labels:
        app: trajectory-worker-job-factory
    spec:
      serviceAccountName: flights-pipeline-default-sa
      terminationGracePeriodSeconds: 60
      nodeSelector:
#        cloud.google.com/gke-spot: "true"
        cloud.google.com/machine-family: "c3"
      containers:
      - name: trajectory-worker-job-factory
        image: {{ .Values.image | required ".Values.image is required" | quote }}
        env:
          - name: TWJD_SUBSCRIPTION_ID
            value: {{ .Values.twjdSubscriptionId | required ".Values.twjdSubscriptionId is required" | quote }}
          - name: TRAJECTORY_CHUNK_TOPIC_ID
            value: {{ .Values.trajectoryChunkTopicId | required ".Values.trajectoryChunkTopicId is required" | quote }}
          - name: LOG_LEVEL
            value: {{ .Values.logLevel | required ".Values.logLevel is required" | quote }}
          - name: REDIS_HOST
            value: {{ .Values.redisHost | required ".Values.redisHost is required" | quote }}
          - name: REDIS_PORT
            value: {{ .Values.redisPort | required ".Values.redisPort is required" | quote }}
          - name: CONTRAILS_API_KEY
            valueFrom:
              secretKeyRef:
                name: contrails-api-key
                key: CONTRAILS_API_KEY
        resources:
          limits:
            cpu: "0.7"
            memory: "15Gi"
          requests:
            cpu: "0.7"
            memory: "15Gi"