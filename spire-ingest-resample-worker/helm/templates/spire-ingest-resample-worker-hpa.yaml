apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: spire-ingest-resample-worker-scaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: spire-ingest-resample-worker
  minReplicas: 1
  maxReplicas: 2
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
