apiVersion: apps/v1
kind: Deployment
metadata:
  name: spire-ingest-resample-worker
  labels:
    app: spire-ingest-resample-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spire-ingest-resample-worker
  template:
    metadata:
      labels:
        app: spire-ingest-resample-worker
    spec:
      serviceAccountName: flights-pipeline-default-sa
      # terminationGracePeriodSeconds should be greater than the time to
      # perform a single job iteration. When a SIGTERM is received, the job
      # has this much time to gracefully exit before being killed.
      terminationGracePeriodSeconds: 30
      containers:
      - name: spire-ingest-resample-worker
        image: {{ .Values.image | required ".Values.image is required" | quote }}
        env:
          - name: SPIRE_INGEST_WAYPOINTS_SUBSCRIPTION_ID
            value: {{ .Values.spireIngestWaypointsSubscriptionId | required ".Values.spireIngestWaypointsSubscriptionId is required" | quote }}
          - name: SPIRE_RAW_WAYPOINTS_BIGQUERY_TOPIC_ID
            value: {{ .Values.spireRawWaypointsBigQueryTopicId | required ".Values.spireRawWaypointsBigQueryTopicId is required" | quote }}
          - name: SPIRE_WAYPOINTS_BIGQUERY_TOPIC_ID
            value: {{ .Values.spireWaypointsBigQueryTopicId | required ".Values.spireWaypointsBigQueryTopicId is required" | quote }}
          - name: TRAJECTORY_CHUNK_SUBSCRIPTION_ID
            value: {{ .Values.trajectoryChunkTopicId | required ".Values.trajectoryChunkTopicId is required" | quote }}
          - name: REDIS_HOST
            value: {{ .Values.redisHost | required ".Values.redisHost is required" | quote }}
          - name: REDIS_PORT
            value: {{ .Values.redisPort | required ".Values.redisPort is required" | quote }}
          - name: LOG_LEVEL
            value: INFO
        resources:
          limits:
            cpu: "0.1"
            memory: "140Mi"
            ephemeral-storage: "1Gi"
          requests:
            cpu: "0.1"
            memory: "140Mi"
            ephemeral-storage: "1Gi"
