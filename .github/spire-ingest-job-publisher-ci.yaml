name: spire-ingest-job-publisher-ci

on:
  pull_request:
    paths:
      - "spire-ingest-job-publisher/**"
      - ".github/spire-ingest-job-publisher-deploy-dev.yaml"

jobs:
  run-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: ./spire-ingest-api-scraper

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: make install

      - name: Check formatting
        run: make dependency-check

      - name: Lint
        run: make lint

      - name: Check types
        run: make type-check

      - name: Test
        run: make pytest
