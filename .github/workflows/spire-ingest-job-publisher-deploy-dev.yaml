# [DEV] Build, Push & Deploy spire-ingest-job-publisher

name: spire-ingest-job-publisher-deploy-dev

on:
  push:
    branches:
      - 'develop'
    paths:
      - 'spire-ingest-job-publisher/**'
      - '.github/spire-ingest-job-publisher-deploy-dev.yaml'

# avoid possible race condition on multiple merges
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  run-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 'Authenticate to Google Cloud'
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT }}

    - name: 'Set up Google Cloud SDK'
      uses: google-github-actions/setup-gcloud@v2


