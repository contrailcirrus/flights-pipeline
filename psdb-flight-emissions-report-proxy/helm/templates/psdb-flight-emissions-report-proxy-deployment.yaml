apiVersion: apps/v1
kind: Deployment
metadata:
  name: psdb-flight-emissions-report-proxy
  labels:
    app: psdb-flight-emissions-report-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: psdb-flight-emissions-report-proxy
  template:
    metadata:
      labels:
        app: psdb-flight-emissions-report-proxy
    spec:
      serviceAccountName: flights-pipeline-default-sa
      terminationGracePeriodSeconds: 10
      containers:
      - name: psdb-flight-emissions-report-proxy
        image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.0
        args:
          - "--auto-iam-authn"
          - "--port=5432"
          - "--address=0.0.0.0"
          - {{ .Values.psdbConnectionName | required ".Values.psdbConnectionName is required" | quote }}
        securityContext:
          runAsNonRoot: true
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "500m"
            memory: "512Mi"
        ports:
          - containerPort: 5432
