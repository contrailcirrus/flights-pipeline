apiVersion: batch/v1
kind: CronJob
metadata:
  name: flight-emissions-report-cache-cronjob
spec:
  schedule: "0 10 * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 1800
  suspend: {{ .Values.suspendCronjob | required ".Values.suspendCronjob is required" }}

  jobTemplate:
    spec:
      activeDeadlineSeconds: 1200
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: flights-pipeline-default-sa
          terminationGracePeriodSeconds: 60
          containers:
            - name: main
              image: {{ .Values.image | required ".Values.image is required" | quote }}
              env:
                - name: LOG_LEVEL
                  value: {{ .Values.logLevel | required ".Values.logLevel is required" | quote }}
                - name: PSDB_USER
                  value: {{ .Values.psdbUser | required ".Values.psdbUser is required" | quote }}
                - name: PSDB_HOST
                  value: "127.0.0.1"
                - name: PSDB_PASS
                  valueFrom:
                    secretKeyRef:
                      name: fer-psdb-interal-user-rw-pwd-secret
                      key: PASSWORD
              resources:
                requests:
                  cpu: "1"
                  memory: "5Gi"
                  ephemeral-storage: "1Gi"
                limits:
                  cpu: "1"
                  memory: "5Gi"
                  ephemeral-storage: "1Gi"
            - name: cloud-sql-proxy
              # cloud sql proxy sidecar:
              # https://cloud.google.com/sql/docs/postgres/sql-proxy
              # https://cloud.google.com/sql/docs/postgres/connect-instance-kubernetes
              image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:d8ad82fa35da3
              args:
                - "--port=5432"
                - {{ .Values.psdbConnectionName | required ".Values.psdbConnectionName is required" | quote }}
              securityContext:
                runAsNonRoot: true
