apiVersion: batch/v1
kind: CronJob
metadata:
  name: flight-emissions-report-cache-cronjob
spec:
  schedule: "0 10 * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 1800
  suspend: {{ .Values.suspendCronjob | required ".Values.suspendCronjob is required" }}

  jobTemplate:
    spec:
      activeDeadlineSeconds: 1200
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: flights-pipeline-default-sa
          terminationGracePeriodSeconds: 60
          containers:
            - name: main
              image: {{ .Values.image | required ".Values.image is required" | quote }}
              env:
                - name: LOG_LEVEL
                  value: {{ .Values.logLevel | required ".Values.logLevel is required" | quote }}
                - name: PSDB_USER
                  value: {{ .Values.psdbUser | required ".Values.psdbUser is required" | quote }}
                - name: PSDB_HOST
                  value: {{ .Values.psdbHost | required ".Values.psdbHost is required" | quote }}
                - name: PSDB_PASS
                  valueFrom:
                    secretKeyRef:
                      name: fer-psdb-interal-user-rw-pwd-secret
                      key: PASSWORD
              resources:
                requests:
                  cpu: "1"
                  memory: "5Gi"
                  ephemeral-storage: "1Gi"
                limits:
                  cpu: "1"
                  memory: "5Gi"
                  ephemeral-storage: "1Gi"
