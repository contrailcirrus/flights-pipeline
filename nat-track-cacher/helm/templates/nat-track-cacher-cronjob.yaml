apiVersion: batch/v1
kind: CronJob
metadata:
  name: nat-track-cacher
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 60
  suspend: {{ .Values.suspendCronjob | required ".Values.suspendCronjob is required" }}

  jobTemplate:
    spec:
      activeDeadlineSeconds: 120
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: flights-pipeline-default-sa
          terminationGracePeriodSeconds: 30
          containers:
            - name: main
              image: {{ .Values.image | required ".Values.image is required" | quote }}
              env:
                - name: LOG_LEVEL
                  value: {{ .Values.logLevel | required ".Values.logLevel is required" | quote }}
                - name: NAT_TRACK_API_URL
                  value: {{ .Values.natTrackApiUrl | required ".Values.natTrackApiUrl is required" | quote }}
                - name: BQ_TABLE_ID
                  value: {{ .Values.bqTableId | required ".Values.bqTableId is required" | quote }}
              resources:
                requests:
                  cpu: "0.5"
                  memory: "100Mi"
                  ephemeral-storage: "1Gi"
                limits:
                  cpu: "0.5"
                  memory: "100Mi"
                  ephemeral-storage: "1Gi"
