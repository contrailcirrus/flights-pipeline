apiVersion: apps/v1
kind: Deployment
metadata:
  name: trajectory-worker-gaia-backup
  labels:
    app: trajectory-worker-gaia-backup
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trajectory-worker-gaia-backup
  template:
    metadata:
      labels:
        app: trajectory-worker-gaia-backup
    spec:
      serviceAccountName: flights-pipeline-default-sa
      # terminationGracePeriodSeconds should be greater than the time to
      # perform a single job iteration. When a SIGTERM is received, the job
      # has this much time to gracefully exit before being killed.
      terminationGracePeriodSeconds: 600
      nodeSelector:
        cloud.google.com/compute-class: "Performance"
        cloud.google.com/machine-family: "c4"
      containers:
      - name: trajectory-worker-gaia-backup
        image: {{ .Values.image | required ".Values.image is required" | quote }}
        env:
          - name: TRAJECTORY_CHUNK_SUBSCRIPTION_ID
            value: {{ .Values.trajectoryChunkGaiaBackupSubscriptionId | required ".Values.trajectoryChunkGaiaBackupSubscriptionId is required" | quote }}
          - name: HRES_SOURCE_PATH
            value: {{ .Values.hresSourcePath | required ".Values.hresSourcePath is required" | quote }}
          - name: ERA5_SOURCE_PATH
            value: {{ .Values.era5SourcePath | required ".Values.era5SourcePath is required" | quote }}
          - name: GIT_SHA
            value: {{ .Values.gitSha | required ".Values.gitSha is required" | quote }}
          - name: TRAJECTORY_COCIP_BQ_TOPIC_ID
            value: {{ .Values.trajectoryCocipBqTopicId | required ".Values.trajectoryCocipBqTopicId is required" | quote }}
          - name: N_JOBS
            value: {{ .Values.nJobs | required ".Values.nJobs is required" | quote }}
          - name: LOG_LEVEL
            value: {{ .Values.logLevel | required ".Values.logLevel is required" | quote }}
          - name: GCP_SVC_ACCT_KEY
            valueFrom:
              secretKeyRef:
                name: gcp-service-account-key
                key: GCP_SVC_ACCT_KEY
        resources:
          limits:
            cpu: "0.75"
            memory: "3Gi"
          requests:
            cpu: "0.75"
            memory: "3Gi"
