apiVersion: apps/v1
kind: Deployment
metadata:
  name: trajectory-worker-gaia
  labels:
    app: trajectory-worker-gaia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trajectory-worker-gaia
  template:
    metadata:
      labels:
        app: trajectory-worker-gaia
    spec:
      serviceAccountName: flights-pipeline-default-sa
      # terminationGracePeriodSeconds should be greater than the time to
      # perform a single job iteration. When a SIGTERM is received, the job
      # has this much time to gracefully exit before being killed.
      terminationGracePeriodSeconds: 15
      nodeSelector:
        cloud.google.com/gke-spot: "true"
     #   cloud.google.com/compute-class: "Performance"
        cloud.google.com/machine-family: "c3"
      volumes:
        - name: ecmwf-zarr-v2
          persistentVolumeClaim:
            claimName: era5-zarr-gcs-pvc
      containers:
      - name: trajectory-worker-gaia
        image: {{ .Values.image | required ".Values.image is required" | quote }}
        volumeMounts:
          - mountPath: /ecmwf-zarr-v2
            name: ecmwf-zarr-v2
        env:
          - name: TRAJECTORY_CHUNK_SUBSCRIPTION_ID
            value: {{ .Values.trajectoryChunkGaiaSubscriptionId | required ".Values.trajectoryChunkGaiaSubscriptionId is required" | quote }}
          - name: TRAJECTORY_CHUNK_BACKUP_TOPIC_ID
            value: {{ .Values.trajectoryChunkGaiaBackupTopicId | required ".Values.trajectoryChunkGaiaBackupTopicId is required" | quote }}
          - name: HRES_SOURCE_PATH
            value: {{ .Values.hresSourcePath | required ".Values.hresSourcePath is required" | quote }}
          - name: ERA5_SOURCE_PATH
            value: {{ .Values.era5SourcePath | required ".Values.era5SourcePath is required" | quote }}
          - name: GIT_SHA
            value: {{ .Values.gitSha | required ".Values.gitSha is required" | quote }}
          - name: TRAJECTORY_COCIP_BQ_TOPIC_ID
            value: {{ .Values.trajectoryCocipBqTopicId | required ".Values.trajectoryCocipBqTopicId is required" | quote }}
          - name: GCS_BUCKET_NAME
            value: {{ .Values.gcsBucketName | required ".Values.gcsBucketName is required" | quote }}
          - name: LOG_LEVEL
            value: {{ .Values.logLevel | required ".Values.logLevel is required" | quote }}
          - name: GCP_SVC_ACCT_KEY
            valueFrom:
              secretKeyRef:
                name: gcp-service-account-key
                key: GCP_SVC_ACCT_KEY
        resources:
          limits:
            cpu: "0.25"
            memory: "0.5Gi"
            ephemeral-storage: "0.05Gi"
          requests:
            cpu: "0.25"
            memory: "0.5Gi"
            ephemeral-storage: "0.05Gi"
