syntax = "proto3";

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";
import "lib/multiline.proto";

package lib;

message Contrail {
    google.protobuf.Timestamp time_start = 1;
    google.protobuf.Duration duration_start_to_end = 2;
    // mean avg elapsed time between time_start and the original time of formation
    // for each segment of the multiline
    google.protobuf.Duration avg_age = 3;
    sint32 sum_ef_mj = 4;  // encoded as (sum_ef_mJ / 100) -- resolution 1 unit ~= 0.3 kg CO2e GWP100
    lib.MultiLine geometry = 5;
}