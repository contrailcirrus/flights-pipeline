syntax = "proto3";

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";

package lib;

message Segment {
    // start position of segment
    google.protobuf.Timestamp time_start = 1;
    sint32 lon_start = 2;  // encoded as (lon * 20) -- 0.05deg -- 13bit space
    sint32 lat_start = 3;  // encoded as (lat * 20) -- 0.05deg -- 12bit space
    uint32 alt_ft_start = 4;  // encoded as (alt_ft / 16) -- 12bit space

    // end position of segment
    google.protobuf.Duration duration_start_to_end = 5;
    sint32 lon_end = 6;
    sint32 lat_end = 7;
    uint32 alt_ft_end = 8;

    sint32 sum_ef_mj = 9;  // encoded as (sum_ef_mJ / 100) -- 1 unit ~= 0.3 kg CO2e GWP100
}