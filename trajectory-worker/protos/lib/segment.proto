syntax = "proto3";

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";

package lib;

message Segment {
    bytes flight_id = 1;  // 16byte (128bit)

    // start position of segment
    google.protobuf.Timestamp time_start = 2;
    sint32 lon_start = 3;  // encoded as (lon * 20) -- 13bit space
    sint32 lat_start = 4;  // encoded as (lat * 20) -- 12bit space
    uint32 alt_ft_start = 5;  // encoded as (alt_ft / 16) -- 12bit space

    // end position of segment
    google.protobuf.Duration duration_start_to_end = 6;
    sint32 lon_end = 7;
    sint32 lat_end = 8;
    uint32 alt_ft_end = 9;

    sint32 sum_ef_mj = 10;  // encoded as (sum_ef_mJ / 100) -- 1 unit ~= 0.3 kg CO2e GWP100
}